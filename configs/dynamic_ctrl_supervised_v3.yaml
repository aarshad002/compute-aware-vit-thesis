experiment_name: dynamic_ctrl_supervised_v3

seed: 42

model:
  type: dynamic
  name: deit_tiny_patch16_224
  num_classes: 100
  pretrained: true

training:
  batch_size: 32
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001

data:
  dataset_name: cifar100
  data_dir: ./data
  image_size: 224
  num_workers: 2

logging:
  use_wandb: false

pruning:
  prune_layer: 6
  score_method: l2
  keep_ratio: 0.5

controller:
  enabled: true
  supervised_training: true
  budget_options: [0.25, 0.50, 0.75, 1.0]
  budget_label_path: data/budget_labels_train.json
  val_budget_label_path: data/budget_labels_val.json
  load_backbone_from: outputs/dynamic_fixed_50_20260331_125625/best_model.pt
  hidden_dim: 64
  dropout: 0.2
  class_weights: [1.0, 8.0, 20.0, 7.0]