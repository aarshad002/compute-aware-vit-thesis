experiment_name: baseline_dense_vit
seed: 42

model:
  name: vit_base_patch16_224
  num_classes: 100
  pretrained: false

training:
  batch_size: 32
  epochs: 10
  learning_rate: 0.0001
  weight_decay: 0.0001

data:
  dataset_name: cifar100
  image_size: 224
  num_workers: 2

logging:
  use_wandb: false
  project: dynamic-pruning-thesis
  entity: null

system:
  device: auto
  output_dir: outputs