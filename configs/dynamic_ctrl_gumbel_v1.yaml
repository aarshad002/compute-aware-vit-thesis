experiment_name: dynamic_ctrl_gumbel_v1

seed: 42

model:
  type: dynamic
  name: deit_tiny_patch16_224
  num_classes: 100
  pretrained: true

training:
  batch_size: 1
  epochs: 5
  learning_rate: 0.00005
  weight_decay: 0.0001

data:
  dataset_name: cifar100
  data_dir: ./data
  image_size: 224
  num_workers: 2

logging:
  use_wandb: false

pruning:
  prune_layer: 6
  score_method: l2
  keep_ratio: 0.5

controller:
  enabled: true
  budget_options: [0.25, 0.50, 0.75]
  hidden_dim: 64
  dropout: 0.2
  gumbel_tau: 1.0
  loss_weight: 0.01